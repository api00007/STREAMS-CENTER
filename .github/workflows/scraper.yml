name: Streams Center Scraper

on:
  repository_dispatch:
    types: [trigger-scraper]
  workflow_dispatch: # এটি দিয়ে গিটহাব থেকে ম্যানুয়ালিও রান করতে পারবেন

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper Script
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          TGITHUB_USER: ${{ secrets.TGITHUB_USER }}
          TGITHUB_REPO: ${{ secrets.TGITHUB_REPO }}
          TGITHUB_EMAIL: ${{ secrets.TGITHUB_EMAIL }}
        run: python scraper.py
